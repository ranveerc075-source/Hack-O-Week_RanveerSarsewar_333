quiz webpage
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:0;
}

.container{
    width:600px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

.question{
    margin-bottom:20px;
}

button{
    width:100%;
    padding:10px;
    font-size:16px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    font-size:20px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>General Knowledge Quiz</h1>

<form id="quizForm">

<div class="question">
<p>1. What is the capital of India?</p>
<label><input type="radio" name="q1" value="0"> Mumbai</label><br>
<label><input type="radio" name="q1" value="1"> New Delhi</label><br>
<label><input type="radio" name="q1" value="0"> Kolkata</label><br>
<label><input type="radio" name="q1" value="0"> Chennai</label>
</div>

<div class="question">
<p>2. Which planet is known as the Red Planet?</p>
<label><input type="radio" name="q2" value="0"> Venus</label><br>
<label><input type="radio" name="q2" value="1"> Mars</label><br>
<label><input type="radio" name="q2" value="0"> Jupiter</label><br>
<label><input type="radio" name="q2" value="0"> Saturn</label>
</div>

<div class="question">
<p>3. Who invented the telephone?</p>
<label><input type="radio" name="q3" value="1"> Alexander Graham Bell</label><br>
<label><input type="radio" name="q3" value="0"> Thomas Edison</label><br>
<label><input type="radio" name="q3" value="0"> Nikola Tesla</label><br>
<label><input type="radio" name="q3" value="0"> Albert Einstein</label>
</div>

<div class="question">
<p>4. Which is the largest ocean in the world?</p>
<label><input type="radio" name="q4" value="0"> Atlantic Ocean</label><br>
<label><input type="radio" name="q4" value="1"> Pacific Ocean</label><br>
<label><input type="radio" name="q4" value="0"> Indian Ocean</label><br>
<label><input type="radio" name="q4" value="0"> Arctic Ocean</label>
</div>

<div class="question">
<p>5. Which language is used for web page structure?</p>
<label><input type="radio" name="q5" value="1"> HTML</label><br>
<label><input type="radio" name="q5" value="0"> Python</label><br>
<label><input type="radio" name="q5" value="0"> Java</label><br>
<label><input type="radio" name="q5" value="0"> C++</label>
</div>

<button type="button" onclick="calculateScore()">Submit Quiz</button>

</form>

<div id="result"></div>

</div>

<script>
function calculateScore() {

let score = 0;
let form = document.forms["quizForm"];

for(let i=1; i<=5; i++){
    let q = form["q"+i];
    for(let option of q){
        if(option.checked){
            score += Number(option.value);
        }
    }
}

document.getElementById("result").innerHTML =
"Your Score: " + score + " / 5";

}
</script>

</body>
</html>
