<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Gallery</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px;
}

.gallery{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:15px;
    width:80%;
    margin:auto;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Lightbox */

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    font-size:40px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🏏 Cricket Photo Gallery</h1>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1593341646782-e0b495cff86d" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1606925797300-0b35e9b2a3c6" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1587280501635-68a0e82cd5ff" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1600180758890-6f8a5c3f17f4" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1593113598332-cd288d649433" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1606925797060-497d182d4c3a" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1624880357913-a8539238245b" onclick="openLightbox(this.src)">
<img src="https://images.unsplash.com/photo-1598514982841-72c45c46a2c0" onclick="openLightbox(this.src)">
</div>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">×</span>
<img id="lightbox-img">
</div>

<script>

function openLightbox(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
    document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
