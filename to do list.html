to do list app
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart To-Do List</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    width:400px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-section{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 15px;
    border:none;
    background:#4facfe;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#3a8de0;
}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
}

li{
    background:#f4f4f4;
    padding:10px;
    margin-bottom:8px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.task-buttons button{
    margin-left:5px;
    background:#ff6b6b;
}

.task-buttons button.complete{
    background:#2ecc71;
}

.stats{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    color:#555;
}

</style>
</head>

<body>

<div class="container">

<h2>📋 Daily Task Manager</h2>

<div class="input-section">
<input type="text" id="taskInput" placeholder="Enter a task...">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="stats">
Total Tasks: <span id="total">0</span> |
Completed: <span id="completed">0</span>
</div>

</div>

<script>

let totalTasks = 0
let completedTasks = 0

function addTask(){

    const input = document.getElementById("taskInput")
    const taskText = input.value.trim()

    if(taskText === "") return

    const li = document.createElement("li")

    const taskSpan = document.createElement("span")
    taskSpan.innerText = taskText

    const btnDiv = document.createElement("div")
    btnDiv.classList.add("task-buttons")

    const completeBtn = document.createElement("button")
    completeBtn.innerText = "✔"
    completeBtn.classList.add("complete")

    completeBtn.onclick = function(){
        if(!li.classList.contains("completed")){
            li.classList.add("completed")
            completedTasks++
            updateStats()
        }
    }

    const deleteBtn = document.createElement("button")
    deleteBtn.innerText = "✖"

    deleteBtn.onclick = function(){
        if(li.classList.contains("completed")){
            completedTasks--
        }
        li.remove()
        totalTasks--
        updateStats()
    }

    btnDiv.appendChild(completeBtn)
    btnDiv.appendChild(deleteBtn)

    li.appendChild(taskSpan)
    li.appendChild(btnDiv)

    document.getElementById("taskList").appendChild(li)

    totalTasks++
    updateStats()

    input.value=""
}

function updateStats(){
    document.getElementById("total").innerText = totalTasks
    document.getElementById("completed").innerText = completedTasks
}

</script>

</body>
</html>
