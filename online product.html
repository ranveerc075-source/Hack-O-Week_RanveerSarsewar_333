online product listing page
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Shop - Product Listing</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:20px;
}

.product{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.product img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

.cart{
    background:white;
    margin:20px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>
<h1>My Small Shop</h1>
<p>Simple Product Listing</p>
</header>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>T-Shirt</h3>
<p>₹500</p>
<button onclick="addToCart(500,'T-Shirt')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Jeans</h3>
<p>₹1200</p>
<button onclick="addToCart(1200,'Jeans')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Shoes</h3>
<p>₹2000</p>
<button onclick="addToCart(2000,'Shoes')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Backpack</h3>
<p>₹900</p>
<button onclick="addToCart(900,'Backpack')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Watch</h3>
<p>₹1500</p>
<button onclick="addToCart(1500,'Watch')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Cap</h3>
<p>₹300</p>
<button onclick="addToCart(300,'Cap')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Sunglasses</h3>
<p>₹700</p>
<button onclick="addToCart(700,'Sunglasses')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Wallet</h3>
<p>₹600</p>
<button onclick="addToCart(600,'Wallet')">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<h3>Total: ₹<span id="total">0</span></h3>
<button onclick="placeOrder()">Place Order</button>
</div>

<script>
let total = 0;

function addToCart(price,name){
    total += price;

    let item = document.createElement("li");
    item.textContent = name + " - ₹" + price;

    document.getElementById("cartItems").appendChild(item);
    document.getElementById("total").textContent = total;
}

function placeOrder(){
    alert("Order placed successfully! Total amount: ₹" + total);
}
</script>

</body>
</html>
